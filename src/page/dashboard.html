<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/dashboard_styles.css" />
    <link rel="stylesheet" href="../css/darkmode.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <title>Dashboard Ventas Tableros</title>
  </head>

  <body>
    <div class="contenedor-principal">
      <aside class="barra-lateral">
        <div class="indicador-menu">☰</div>
        <div class="logo">Tableros corp</div>

        <div class="perfil-usuario">
          <img src="../img/asdasd.jpg" alt="foto-de-perfil" />
          <h3>Nombre Usuario</h3>
          <p>Administrador</p>
        </div>

        <nav class="menu-navegacion">
          <ul>
            <li class="activo" data-seccion="dashboard">Dashboard</li>
            <li data-seccion="ventas">Ventas</li>
            <li data-seccion="productos" data-link="productos.html">Productos</li>
            <li data-seccion="inventario">Inventario</li>
            <li data-seccion="clientes">Clientes</li>
          </ul>
        </nav>

        <div class="menu-opciones">
          <button id="btn-configuracion">Configuración</button>
        </div>
        <div class="cerrar-sesion">
          <button>Cerrar sesión</button>
        </div>
      </aside>

      <!-- Panel de Configuración -->
      <div id="panel-configuracion" class="panel-configuracion">
        <div class="panel-header">
          <h3>Configuración</h3>
          <button id="cerrar-panel">✕</button>
        </div>
        <div class="panel-contenido">
          <div class="opcion-config">
            <label for="foto-perfil">Cambiar Foto de Perfil:</label>
            <input type="file" id="foto-perfil" accept="image/*" />

            <!-- Conectar con backend para subir imagen -->

          </div>
          <!-- modo oscuro -->
          
          <div class="opcion-config">
            <label class="switch">
              <input type="checkbox" id="modo-oscuro" />
              <span class="slider"></span>
            </label>
            <span>Modo Oscuro</span>
          </div>
        </div>
      </div>

      <!-- aca es literalmente todo el dashboard -->
      
      <main class="contenido-dashboard">
        <header class="cabecera-dashboard">
          <h1>Panel de Ventas</h1>
        </header>

        <section class="metricas-resumen">
          <div class="metrica">
            <p>Ventas del mes</p>
            <span id="ventas-del-mes" class="valor"></span>
          </div>

          <div class="metrica">
            <p>Productos vendidos</p>
            <span id="productos-vendidos" class="valor"></span>
          </div>

          <div class="metrica">
            <p>Pedidos</p>
            <span id="productos-pedidos" class="valor"></span>
          </div>

        </section>

        <div class="fila-central">
          <section class="grafico-actividad">
            <h2>Ventas por semana</h2>
            <canvas id="ventasChart"></canvas>
          </section>

          <section class="mejores-interpretes">
            <h2>Productos más vendidos</h2>
            <div class="grafico-polar-container">
              <canvas id="productosPolarChart"></canvas>
            </div>
          </section>
        </div>


          </div>
        </section>
      </main>
    </div>

<script type="module" src="../logica/dashboard.js"></script>
<script src="../logica/tema.js"></script>
  </body>
</html>
